<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found | LegAlly</title>
    
    <!-- SEO Meta Tags -->
    <meta name="description" content="Oops! The page you are looking for on LegAlly does not exist. Go back to our homepage to scan your website for accessibility.">
    <meta name="robots" content="noindex, follow">
    
    <link rel="stylesheet" href="style.css">
</head>
<body style="display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; text-align: center; padding: 24px;">

    <div class="glass-panel" style="max-width: 500px; width: 100%; padding: 40px; border-radius: 20px; border: 1px solid var(--border-color); background: rgba(16, 22, 38, 0.6); backdrop-filter: blur(20px); box-shadow: var(--shadow); position: relative; overflow: hidden; display: flex; flex-direction: column; gap: 20px; align-items: center;">
        
        <!-- Ambient Glow internally -->
        <div style="position: absolute; width: 120px; height: 120px; border-radius: 50%; filter: blur(50px); top: -20px; left: -20px; background: var(--primary); opacity: 0.3; pointer-events: none;"></div>
        <div style="position: absolute; width: 120px; height: 120px; border-radius: 50%; filter: blur(50px); bottom: -20px; right: -20px; background: var(--secondary); opacity: 0.3; pointer-events: none;"></div>
        
        <div style="font-size: 5rem; font-weight: 800; font-family: var(--font-heading); background: linear-gradient(135deg, var(--primary), var(--secondary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin: 0; line-height: 1; filter: drop-shadow(0 2px 15px rgba(99,102,241,0.25));">
            404
        </div>
        
        <h1 style="font-size: 1.8rem; margin: 0; font-family: var(--font-heading); color: #fff;">Lost in Space?</h1>
        
        <p style="color: var(--text-muted); font-size: 0.95rem; line-height: 1.6; margin: 0;">
            The page you are looking for might have been removed, had its name changed, or is temporarily unavailable. Let's get you back on track!
        </p>
        
        <a href="index.html" class="btn-scan" style="text-decoration: none; display: inline-flex; align-items: center; justify-content: center; gap: 8px; width: 100%; margin-top: 10px; font-weight: 600; color: #fff;">
            🛡️ Go Back to Homepage
        </a>
        
    </div>

</body>
</html>
